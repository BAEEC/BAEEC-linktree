<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>น้องใหม่ PIM — ติดตามเราได้เลย!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #272067;
      --navy-dark: #1a1548;
      --navy-light: #3a3290;
      --green: #00BC70;
      --green-dark: #009959;
      --green-light: #00d97e;
      --white: #ffffff;
      --off-white: #f5f7ff;
      --text-muted: rgba(255,255,255,0.6);
    }

    body {
      min-height: 100vh;
      background: var(--navy-dark);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      font-family: 'IBM Plex Sans Thai', 'Noto Sans Thai', sans-serif;
      padding: 0;
    }

    .page {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.5rem 4rem;
      position: relative;
      overflow: hidden;
    }

    /* Background decoration */
    .page::before {
      content: '';
      position: fixed;
      top: -120px;
      left: 50%;
      transform: translateX(-50%);
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(0,188,112,0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    .page::after {
      content: '';
      position: fixed;
      bottom: -100px;
      right: -80px;
      width: 320px;
      height: 320px;
      background: radial-gradient(circle, rgba(39,32,103,0.6) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Header */
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 2.5rem;
      animation: fadeDown 0.6s ease both;
    }

    .logo-ring {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: var(--navy-light);
      border: 3px solid var(--green);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.1rem;
      position: relative;
      box-shadow: 0 0 0 6px rgba(0,188,112,0.12), 0 8px 32px rgba(0,0,0,0.35);
    }

    .logo-ring svg {
      width: 52px;
      height: 52px;
    }

    .green-dot {
      width: 14px;
      height: 14px;
      background: var(--green);
      border-radius: 50%;
      position: absolute;
      bottom: 4px;
      right: 4px;
      border: 2px solid var(--navy-dark);
    }

    h1 {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--white);
      text-align: center;
      line-height: 1.3;
      margin-bottom: 0.4rem;
      letter-spacing: -0.01em;
    }

    .subtitle {
      font-size: 0.85rem;
      color: var(--text-muted);
      text-align: center;
      letter-spacing: 0.04em;
    }

    /* Links */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.25rem;
      border-radius: 16px;
      text-decoration: none;
      color: var(--white);
      font-family: inherit;
      font-size: 1rem;
      font-weight: 500;
      border: 1.5px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.06);
      transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
      position: relative;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    .link-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(0,188,112,0.08) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.18s;
    }

    .link-btn:hover { transform: translateY(-2px); background: rgba(255,255,255,0.1); border-color: rgba(0,188,112,0.4); box-shadow: 0 6px 24px rgba(0,0,0,0.25); }
    .link-btn:hover::before { opacity: 1; }
    .link-btn:active { transform: scale(0.97); }

    .icon-wrap {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .icon-wrap svg { display: block; }

    .link-text { flex: 1; }
    .link-platform { font-size: 0.75rem; color: var(--text-muted); display: block; margin-bottom: 1px; }
    .link-name { font-size: 0.97rem; font-weight: 600; display: block; }

    .link-arrow {
      font-size: 1.2rem;
      color: var(--green);
      opacity: 0.7;
      flex-shrink: 0;
    }

    /* TikTok */
    .tt .icon-wrap { background: #111; border: 1px solid rgba(255,255,255,0.1); }
    /* Instagram */
    .ig .icon-wrap { background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
    /* Facebook */
    .fb .icon-wrap { background: #1877F2; }
    /* YouTube */
    .yt .icon-wrap { background: #FF0000; }

    /* Staggered animation */
    .link-btn { animation: fadeUp 0.5s ease both; }
    .link-btn:nth-child(1) { animation-delay: 0.15s; }
    .link-btn:nth-child(2) { animation-delay: 0.25s; }
    .link-btn:nth-child(3) { animation-delay: 0.35s; }
    .link-btn:nth-child(4) { animation-delay: 0.45s; }

    /* Divider */
    .divider {
      width: 100%;
      height: 1px;
      background: rgba(255,255,255,0.08);
      margin: 2rem 0 1.5rem;
    }

    /* Footer */
    .footer {
      text-align: center;
      animation: fadeUp 0.5s 0.55s ease both;
    }

    .pim-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(0,188,112,0.12);
      border: 1px solid rgba(0,188,112,0.25);
      border-radius: 99px;
      padding: 0.4rem 1rem;
      font-size: 0.82rem;
      color: var(--green-light);
      font-weight: 500;
    }

    .pim-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.85); }
    }
  </style>
</head>
<body>
  <div class="page">

    <header class="header">
      <div class="logo-ring" aria-hidden="true">
        <!-- PIM-style mortarboard icon -->
        <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polygon points="26,8 48,20 26,32 4,20" fill="#00BC70"/>
          <path d="M14 25v10c0 4 5.4 7 12 7s12-3 12-7V25" fill="#ffffff" opacity="0.15" stroke="#00BC70" stroke-width="1.5"/>
          <path d="M14 25v10c0 4 5.4 7 12 7s12-3 12-7V25" fill="none" stroke="#00BC70" stroke-width="1.5"/>
          <line x1="46" y1="20" x2="46" y2="32" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
          <circle cx="46" cy="33" r="2.5" fill="#00BC70"/>
        </svg>
        <span class="green-dot"></span>
      </div>
      <h1>ยินดีต้อนรับน้องใหม่ PIM-EEC 🎉</h1>
      <p class="subtitle">Panyapiwat Institute of Management</p>
    </header>

    <nav class="links" aria-label="ช่องทางโซเชียลมีเดีย">

      <a class="link-btn tt" href="https://www.tiktok.com/@dekbapim" target="_blank" rel="noopener noreferrer">
        <div class="icon-wrap">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
            <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.27 6.27 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.76a4.85 4.85 0 0 1-1.01-.07z"/>
          </svg>
        </div>
        <span class="link-text">
          <span class="link-platform">TikTok</span>
          <span class="link-name">@dekbapim</span>
        </span>
        <span class="link-arrow">›</span>
      </a>

      <a class="link-btn ig" href="https://www.instagram.com/baeecstudio" target="_blank" rel="noopener noreferrer">
        <div class="icon-wrap">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
            <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
          </svg>
        </div>
        <span class="link-text">
          <span class="link-platform">Instagram</span>
          <span class="link-name">@baeecstudio</span>
        </span>
        <span class="link-arrow">›</span>
      </a>

      <a class="link-btn fb" href="https://www.facebook.com/share/g/18k3sZ9eGj/" target="_blank" rel="noopener noreferrer">
        <div class="icon-wrap">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
            <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>
          </svg>
        </div>
        <span class="link-text">
          <span class="link-platform">Facebook</span>
          <span class="link-name">กลุ่มนักศึกษาใหม่</span>
        </span>
        <span class="link-arrow">›</span>
      </a>

      <a class="link-btn yt" href="https://www.youtube.com/@pimbapodcast" target="_blank" rel="noopener noreferrer">
        <div class="icon-wrap">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
            <path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46A2.78 2.78 0 0 0 1.46 6.42 29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58 2.78 2.78 0 0 0 1.95 1.96C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 0 0 1.95-1.96A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z"/>
            <polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" fill="#FF0000"/>
          </svg>
        </div>
        <span class="link-text">
          <span class="link-platform">YouTube</span>
          <span class="link-name">Pimba Podcast</span>
        </span>
        <span class="link-arrow">›</span>
      </a>

    </nav>

    <div class="divider"></div>

    <footer class="footer">
      <div class="pim-badge">
        <span class="pim-dot"></span>
        Panyapiwat Institute of Management
      </div>
    </footer>

  </div>
</body>
</html>
